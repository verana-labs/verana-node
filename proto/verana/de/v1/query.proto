syntax = "proto3";
package verana.de.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "verana/de/v1/params.proto";
import "verana/de/v1/types.proto";

option go_package = "github.com/verana-labs/verana-node/x/de/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/verana-labs/verana/de/v1/params";
  }

  // ListOperatorAuthorizations returns operator authorizations matching optional filters.
  rpc ListOperatorAuthorizations(QueryListOperatorAuthorizationsRequest) returns (QueryListOperatorAuthorizationsResponse) {
    option (google.api.http).get = "/verana/de/v1/operator-authorizations";
  }

  // ListVSOperatorAuthorizations returns VS operator authorizations matching optional filters.
  rpc ListVSOperatorAuthorizations(QueryListVSOperatorAuthorizationsRequest) returns (QueryListVSOperatorAuthorizationsResponse) {
    option (google.api.http).get = "/verana/de/v1/vs-operator-authorizations";
  }

  // [MOD-DE-QRY-3] GetOperatorAuthorization returns a single OperatorAuthorization by id.
  rpc GetOperatorAuthorization(QueryGetOperatorAuthorizationRequest) returns (QueryGetOperatorAuthorizationResponse) {
    option (google.api.http).get = "/verana/de/v1/operator-authorizations/{id}";
  }

  // [MOD-DE-QRY-4] GetVSOperatorAuthorization returns a single VSOperatorAuthorization by id.
  rpc GetVSOperatorAuthorization(QueryGetVSOperatorAuthorizationRequest) returns (QueryGetVSOperatorAuthorizationResponse) {
    option (google.api.http).get = "/verana/de/v1/vs-operator-authorizations/{id}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// QueryListOperatorAuthorizationsRequest is the request type for the
// Query/ListOperatorAuthorizations RPC method.
message QueryListOperatorAuthorizationsRequest {
  // corporation_id filters by the corporation that granted the authorization.
  uint64 corporation_id = 1;
  // operator filters by the operator account that received the authorization.
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // response_max_size limits the number of results. Must be 1-1024, defaults to 64.
  uint32 response_max_size = 3;
}

// QueryListOperatorAuthorizationsResponse is the response type for the
// Query/ListOperatorAuthorizations RPC method.
message QueryListOperatorAuthorizationsResponse {
  repeated OperatorAuthorization operator_authorizations = 1 [(gogoproto.nullable) = false];
}

// QueryListVSOperatorAuthorizationsRequest is the request type for the
// Query/ListVSOperatorAuthorizations RPC method.
message QueryListVSOperatorAuthorizationsRequest {
  // corporation_id filters by the corporation that granted the authorization.
  uint64 corporation_id = 1;
  // vs_operator filters by the VS operator account.
  string vs_operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // response_max_size limits the number of results. Must be 1-1024, defaults to 64.
  uint32 response_max_size = 3;
}

// QueryListVSOperatorAuthorizationsResponse is the response type for the
// Query/ListVSOperatorAuthorizations RPC method.
message QueryListVSOperatorAuthorizationsResponse {
  repeated VSOperatorAuthorization vs_operator_authorizations = 1 [(gogoproto.nullable) = false];
}

// QueryGetOperatorAuthorizationRequest is the request type for the
// Query/GetOperatorAuthorization RPC method.
message QueryGetOperatorAuthorizationRequest {
  // id is the OperatorAuthorization id to fetch.
  uint64 id = 1;
}

// QueryGetOperatorAuthorizationResponse is the response type for the
// Query/GetOperatorAuthorization RPC method.
message QueryGetOperatorAuthorizationResponse {
  OperatorAuthorization operator_authorization = 1 [(gogoproto.nullable) = false];
}

// QueryGetVSOperatorAuthorizationRequest is the request type for the
// Query/GetVSOperatorAuthorization RPC method.
message QueryGetVSOperatorAuthorizationRequest {
  // id is the VSOperatorAuthorization id to fetch.
  uint64 id = 1;
}

// QueryGetVSOperatorAuthorizationResponse is the response type for the
// Query/GetVSOperatorAuthorization RPC method.
message QueryGetVSOperatorAuthorizationResponse {
  VSOperatorAuthorization vs_operator_authorization = 1 [(gogoproto.nullable) = false];
}
