syntax = "proto3";
package verana.xr.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "verana/xr/v1/params.proto";
import "verana/xr/v1/tx.proto";

option go_package = "github.com/verana-labs/verana/x/xr/types";

// GenesisState defines the xr module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  // exchange_rates is the list of all exchange rate entries.
  repeated ExchangeRate exchange_rates = 2 [(gogoproto.nullable) = false];
  // next_exchange_rate_id is the next auto-increment ID for exchange rates.
  uint64 next_exchange_rate_id = 3;
  // exchange_rate_authorizations is the list of all exchange rate authorizations.
  repeated ExchangeRateAuthorization exchange_rate_authorizations = 4 [(gogoproto.nullable) = false];
}
