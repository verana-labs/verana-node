syntax = "proto3";
package verana.td.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "verana/td/v1/params.proto";

option go_package = "github.com/verana-labs/verana-node/x/td/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  rpc ReclaimTrustDepositYield(MsgReclaimTrustDepositYield) returns (MsgReclaimTrustDepositYieldResponse);
  // SlashTrustDeposit defines a governance operation to slash a corporation's trust deposit
  rpc SlashTrustDeposit(MsgSlashTrustDeposit) returns (MsgSlashTrustDepositResponse);
  rpc RepaySlashedTrustDeposit(MsgRepaySlashedTrustDeposit) returns (MsgRepaySlashedTrustDepositResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "verana/x/td/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// MsgReclaimTrustDepositYield defines the request type
// [MOD-TD-MSG-2] Reclaim Trust Deposit Yield
message MsgReclaimTrustDepositYield {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/td/MsgReclaimTrustDepositYield";

  // [MOD-TD-MSG-2-1] parameters per spec: corporation + operator only.
  // The full claimable balance is drained; no amount parameter.

  // corporation is the group address that owns the trust deposit.
  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // operator is the account authorized by the corporation to run this Msg.
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgReclaimTrustDepositYieldResponse defines the response type
message MsgReclaimTrustDepositYieldResponse {
  uint64 claimed_amount = 1;
}

// MsgSlashTrustDeposit defines the message for slashing a corporation's trust deposit
// This can only be executed by the governance module
message MsgSlashTrustDeposit {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "verana/x/td/MsgSlashTrustDeposit";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // corporation_id is the registered Corporation id whose trust deposit will be slashed
  uint64 corporation_id = 5;
  // deposit is the deposit amount to slash (in base denom)
  string deposit = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];
  // [MOD-TD-MSG-5-1] reason for the slash (mandatory per spec)
  string reason = 4;
}

// MsgSlashTrustDepositResponse defines the response for MsgSlashTrustDeposit
message MsgSlashTrustDepositResponse {}

// MsgRepaySlashedTrustDeposit defines the message for repaying a slashed trust deposit.
// [MOD-TD-MSG-6] Any authorized operator CAN execute this on behalf of a corporation.
message MsgRepaySlashedTrustDeposit {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/td/MsgRepaySlashedTrustDeposit";

  // corporation is the group address that owns the slashed trust deposit.
  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // operator is the account authorized by the corporation to run this Msg.
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // deposit is the repayment amount (must equal outstanding slashed amount).
  uint64 deposit = 3;
}

message MsgRepaySlashedTrustDepositResponse {}
