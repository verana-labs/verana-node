syntax = "proto3";
package verana.td.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";
import "verana/td/v1/params.proto";

option go_package = "github.com/verana-labs/verana/x/td/types";

// TrustDeposit represents a corporation's trust deposit
message TrustDeposit {
  // Field 1 ("corporation", account string) and field 4 ("claimable") are
  // reserved: rekeyed to corporation_id (uint64) and renamed to refunded per v4-rc3.
  reserved 1, 4;
  reserved "corporation", "claimable";
  string share = 2 [
    (gogoproto.customtype) = "cosmossdk.io/math.LegacyDec",
    (gogoproto.moretags) = "yaml:\"trust_deposit_share_value\"",
    (gogoproto.nullable) = false
  ];
  uint64 deposit = 3;
  uint64 slashed_deposit = 5;
  uint64 repaid_deposit = 6;
  google.protobuf.Timestamp last_slashed = 7 [(gogoproto.stdtime) = true];
  google.protobuf.Timestamp last_repaid = 8 [(gogoproto.stdtime) = true];
  uint64 slash_count = 9;
  // corporation_id is the registered Corporation id that owns this trust deposit (primary key).
  uint64 corporation_id = 10;
  // refunded is the amount eligible to be recycled/reclaimed (was "claimable").
  uint64 refunded = 11;
}

message SlashTrustDepositProposal {
  string title = 1 [(gogoproto.moretags) = "yaml:\"title\""];
  string description = 2 [(gogoproto.moretags) = "yaml:\"description\""];
  string corporation = 3 [(gogoproto.moretags) = "yaml:\"corporation\""];
  string deposit = 4 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false,
    (gogoproto.moretags) = "yaml:\"deposit\""
  ];
}
