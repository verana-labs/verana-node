syntax = "proto3";
package verana.ec.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "verana/ec/v1/params.proto";

option go_package = "github.com/verana-labs/verana-node/x/ec/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // [MOD-ES-MSG-1] Create New Ecosystem.
  rpc CreateEcosystem(MsgCreateEcosystem) returns (MsgCreateEcosystemResponse);
  // [MOD-ES-MSG-2] Update Ecosystem (rotate did).
  rpc UpdateEcosystem(MsgUpdateEcosystem) returns (MsgUpdateEcosystemResponse);
  // [MOD-ES-MSG-3] Archive/unarchive Ecosystem.
  rpc ArchiveEcosystem(MsgArchiveEcosystem) returns (MsgArchiveEcosystemResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "verana/x/ec/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message MsgUpdateParamsResponse {}

// MsgCreateEcosystem implements MOD-ES-MSG-1. Signed by `operator`;
// AUTHZ-CHECK-5 resolves the signing `corporation` policy_address to the
// controlling Corporation entry. Seeds v1 of the Ecosystem's Governance
// Framework via MOD-GF.
message MsgCreateEcosystem {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/ec/MsgCreateEcosystem";

  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string did = 3;
  string language = 4;
  string doc_url = 5;
  string doc_digest_sri = 6;
}

message MsgCreateEcosystemResponse {
  uint64 ecosystem_id = 1;
}

// MsgUpdateEcosystem implements MOD-ES-MSG-2. Only `did` is mutable.
message MsgUpdateEcosystem {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/ec/MsgUpdateEcosystem";

  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 3;
  string did = 4;
}

message MsgUpdateEcosystemResponse {}

// MsgArchiveEcosystem implements MOD-ES-MSG-3. `archive` is a boolean toggle;
// submitting the current state is an idempotency abort.
message MsgArchiveEcosystem {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/ec/MsgArchiveEcosystem";

  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 3;
  bool archive = 4;
}

message MsgArchiveEcosystemResponse {}
