syntax = "proto3";
package verana.pp.module;

import "cosmos/app/v1alpha1/module.proto";

option go_package = "github.com/verana-labs/verana-node/x/pp/module;participant";

// Module is the config object for the module.
message Module {
  option (cosmos.app.v1alpha1.module) = {go_import: "github.com/verana-labs/verana-node/x/pp"};

  // authority defines the custom module authority. If not set, defaults to the governance module.
  string authority = 1;
}
