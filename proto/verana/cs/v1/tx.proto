syntax = "proto3";
package verana.cs.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";
import "verana/cs/v1/params.proto";
import "verana/cs/v1/types.proto";

option go_package = "github.com/verana-labs/verana/x/cs/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);
  // CreateCredentialSchema defines a method for creating a new credential schema.
  rpc CreateCredentialSchema(MsgCreateCredentialSchema) returns (MsgCreateCredentialSchemaResponse);
  // UpdateCredentialSchema defines a method for updating a credential schema.
  rpc UpdateCredentialSchema(MsgUpdateCredentialSchema) returns (MsgUpdateCredentialSchemaResponse);
  // ArchiveCredentialSchema defines a method for archiving a credential schema.
  rpc ArchiveCredentialSchema(MsgArchiveCredentialSchema) returns (MsgArchiveCredentialSchemaResponse);
  // [MOD-CS-MSG-5] CreateSchemaAuthorizationPolicy creates a versioned policy document for a schema role.
  rpc CreateSchemaAuthorizationPolicy(MsgCreateSchemaAuthorizationPolicy) returns (MsgCreateSchemaAuthorizationPolicyResponse);
  // [MOD-CS-MSG-6] IncreaseActiveSchemaAuthorizationPolicyVersion advances the active policy version.
  rpc IncreaseActiveSchemaAuthorizationPolicyVersion(MsgIncreaseActiveSchemaAuthorizationPolicyVersion) returns (MsgIncreaseActiveSchemaAuthorizationPolicyVersionResponse);
  // [MOD-CS-MSG-7] RevokeSchemaAuthorizationPolicy revokes a specific policy version.
  rpc RevokeSchemaAuthorizationPolicy(MsgRevokeSchemaAuthorizationPolicy) returns (MsgRevokeSchemaAuthorizationPolicyResponse);
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "verana/x/cs/MsgUpdateParams";

  // authority is the address that controls the module (defaults to x/gov unless overwritten).
  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the module parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

// [MOD-CS-MSG-1] Create New Credential Schema
message MsgCreateCredentialSchema {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/cs/MsgCreateCredentialSchema";

  // corporation is the group account on whose behalf this message is executed
  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // operator is the account authorized by the corporation to run this Msg
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  reserved 3; // tr_id removed in v4-rc2 (issue #305)
  string json_schema = 4;
  OptionalUInt32 issuer_grantor_validation_validity_period = 5 [(gogoproto.nullable) = true];
  OptionalUInt32 verifier_grantor_validation_validity_period = 6 [(gogoproto.nullable) = true];
  OptionalUInt32 issuer_validation_validity_period = 7 [(gogoproto.nullable) = true];
  OptionalUInt32 verifier_validation_validity_period = 8 [(gogoproto.nullable) = true];
  OptionalUInt32 holder_validation_validity_period = 9 [(gogoproto.nullable) = true];
  uint32 issuer_onboarding_mode = 10;
  uint32 verifier_onboarding_mode = 11;
  uint32 pricing_asset_type = 12;
  string pricing_asset = 13;
  string digest_algorithm = 14;
  uint32 holder_onboarding_mode = 15;
  uint64 ecosystem_id = 16;
}

message MsgCreateCredentialSchemaResponse {
  uint64 id = 1; // ID of the created credential schema for confirmation
}

// [MOD-CS-MSG-2] Update Credential Schema
message MsgUpdateCredentialSchema {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/cs/MsgUpdateCredentialSchema";

  // corporation is the group account on whose behalf this message is executed
  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // operator is the account authorized by the corporation to run this Msg
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 3;
  OptionalUInt32 issuer_grantor_validation_validity_period = 4 [(gogoproto.nullable) = true];
  OptionalUInt32 verifier_grantor_validation_validity_period = 5 [(gogoproto.nullable) = true];
  OptionalUInt32 issuer_validation_validity_period = 6 [(gogoproto.nullable) = true];
  OptionalUInt32 verifier_validation_validity_period = 7 [(gogoproto.nullable) = true];
  OptionalUInt32 holder_validation_validity_period = 8 [(gogoproto.nullable) = true];
}

// OptionalUInt32 is a wrapper for optional uint32 values
message OptionalUInt32 {
  uint32 value = 1;
}

message MsgUpdateCredentialSchemaResponse {}

// [MOD-CS-MSG-3] Archive Credential Schema
message MsgArchiveCredentialSchema {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/cs/MsgArchiveCredentialSchema";

  // corporation is the group account on whose behalf this message is executed
  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // operator is the account authorized by the corporation to run this Msg
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 id = 3;
  bool archive = 4;
}

message MsgArchiveCredentialSchemaResponse {}

// [MOD-CS-MSG-5] MsgCreateSchemaAuthorizationPolicy creates a new schema authorization policy.
message MsgCreateSchemaAuthorizationPolicy {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/cs/MsgCreateSchemaAuthPolicy";

  // [MOD-CS-MSG-5-1] parameters per spec v4 draft 13:
  // corporation, operator, schema_id, role, url, digest_sri.
  // effective_from and effective_until are set to null at creation (MOD-CS-MSG-5-3).
  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 schema_id = 3;
  SchemaAuthorizationPolicyRole role = 4;
  string url = 5;
  string digest_sri = 6;
  reserved 7, 8;
  reserved "effective_from", "effective_until";
}

message MsgCreateSchemaAuthorizationPolicyResponse {
  uint64 id = 1;
}

// [MOD-CS-MSG-6] MsgIncreaseActiveSchemaAuthorizationPolicyVersion advances the active policy version for a role.
message MsgIncreaseActiveSchemaAuthorizationPolicyVersion {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/cs/MsgIncSchemaAuthPolicyVer";

  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 schema_id = 3;
  SchemaAuthorizationPolicyRole role = 4;
}

message MsgIncreaseActiveSchemaAuthorizationPolicyVersionResponse {}

// [MOD-CS-MSG-7] MsgRevokeSchemaAuthorizationPolicy revokes a specific policy version.
message MsgRevokeSchemaAuthorizationPolicy {
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/cs/MsgRevokeSchemaAuthPolicy";

  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  uint64 schema_id = 3;
  SchemaAuthorizationPolicyRole role = 4;
  uint32 version = 5;
}

message MsgRevokeSchemaAuthorizationPolicyResponse {}
