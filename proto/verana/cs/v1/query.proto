syntax = "proto3";
package verana.cs.v1;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "verana/cs/v1/params.proto";
import "verana/cs/v1/types.proto";

option go_package = "github.com/verana-labs/verana-node/x/cs/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/cs/v1/params";
  }
  // ListCredentialSchemas queries a list of CredentialSchema items.
  rpc ListCredentialSchemas(QueryListCredentialSchemasRequest) returns (QueryListCredentialSchemasResponse) {
    option (google.api.http).get = "/verana/cs/v1/list";
  }
  // GetCredentialSchema returns a credential schema by ID
  rpc GetCredentialSchema(QueryGetCredentialSchemaRequest) returns (QueryGetCredentialSchemaResponse) {
    option (google.api.http).get = "/verana/cs/v1/get/{id}";
  }
  // RenderJsonSchema returns the JSON schema definition
  rpc RenderJsonSchema(QueryRenderJsonSchemaRequest) returns (QueryRenderJsonSchemaResponse) {
    option (google.api.http).get = "/verana/cs/v1/js/{id}";
  }
  // GetSchemaAuthorizationPolicy returns a SchemaAuthorizationPolicy by id.
  rpc GetSchemaAuthorizationPolicy(QueryGetSchemaAuthorizationPolicyRequest) returns (QueryGetSchemaAuthorizationPolicyResponse) {
    option (google.api.http).get = "/verana/cs/v1/sap/get/{id}";
  }
  // ListSchemaAuthorizationPolicies lists policies for a (schema_id, role) pair, ordered by ascending version.
  rpc ListSchemaAuthorizationPolicies(QueryListSchemaAuthorizationPoliciesRequest) returns (QueryListSchemaAuthorizationPoliciesResponse) {
    option (google.api.http).get = "/verana/cs/v1/sap/list";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message QueryListCredentialSchemasRequest {
  reserved 1; // tr_id removed in v4-rc2 (issue #305)
  google.protobuf.Timestamp modified_after = 2 [
    (gogoproto.stdtime) = true,
    (gogoproto.nullable) = true
  ];
  uint32 response_max_size = 3;
  bool only_active = 4;
  IssuerOnboardingMode issuer_onboarding_mode = 5;
  VerifierOnboardingMode verifier_onboarding_mode = 6;
  HolderOnboardingMode holder_onboarding_mode = 7;
  uint64 ecosystem_id = 8; // optional filter (replaces tr_id)
}

message QueryListCredentialSchemasResponse {
  repeated CredentialSchema schemas = 1 [(gogoproto.nullable) = false];
}

message QueryGetCredentialSchemaRequest {
  uint64 id = 1;
}

message QueryGetCredentialSchemaResponse {
  CredentialSchema schema = 1 [(gogoproto.nullable) = false];
}

message QueryRenderJsonSchemaRequest {
  uint64 id = 1;
}

message QueryRenderJsonSchemaResponse {
  string schema = 1;
}

message QueryGetSchemaAuthorizationPolicyRequest {
  uint64 id = 1;
}

message QueryGetSchemaAuthorizationPolicyResponse {
  SchemaAuthorizationPolicy authorization_policy = 1 [(gogoproto.nullable) = false];
}

message QueryListSchemaAuthorizationPoliciesRequest {
  uint64 schema_id = 1;
  SchemaAuthorizationPolicyRole role = 2;
}

message QueryListSchemaAuthorizationPoliciesResponse {
  repeated SchemaAuthorizationPolicy policies = 1 [(gogoproto.nullable) = false];
}
