syntax = "proto3";
package verana.co.v1;

import "amino/amino.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/any.proto";
import "verana/co/v1/params.proto";

option go_package = "github.com/verana-labs/verana-node/x/co/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // UpdateParams defines a (governance) operation for updating the module
  // parameters. The authority defaults to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  // [MOD-CO-MSG-1] Create New Corporation — atomically create an x/group
  // group + group policy and register the resulting policy_address as a new
  // Corporation VPR entry.
  rpc CreateCorporation(MsgCreateCorporation) returns (MsgCreateCorporationResponse);

  // [MOD-CO-MSG-2] Update Corporation — rotate the DID of an existing
  // Corporation. Signers: corporation (policy_address) + operator.
  rpc UpdateCorporation(MsgUpdateCorporation) returns (MsgUpdateCorporationResponse);
}

// Member is the MOD-CO-local mirror of cosmos.group.v1.MemberRequest. We don't
// import the x/group proto directly because the buf cosmos-sdk dep pinned by
// this repo predates the x/group proto export. The Go keeper converts this
// type to the cosmos.group.v1.MemberRequest before calling x/group.
message Member {
  // address is the bech32 address of the member.
  string address = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // weight is the member's voting weight. MUST be a non-zero decimal string
  // representing a positive number (e.g. "1", "10").
  string weight = 2;
  // metadata is optional arbitrary metadata attached to the member.
  string metadata = 3;
}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  option (cosmos.msg.v1.signer) = "authority";
  option (amino.name) = "verana/x/co/MsgUpdateParams";

  string authority = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  Params params = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}

message MsgUpdateParamsResponse {}

// MsgCreateCorporation — MOD-CO-MSG-1.
//
// Signer is the submitting account; no privilege required. Forwarded as the
// `admin` field of the underlying `MsgCreateGroupWithPolicy`. After execution,
// the signer holds no ongoing admin privileges over the group, group policy,
// or Corporation — the group_policy_address becomes the admin of both the
// group and the group policy (`group_policy_as_admin` is hardcoded to `true`).
message MsgCreateCorporation {
  option (cosmos.msg.v1.signer) = "signer";
  option (amino.name) = "verana/x/co/MsgCreateCorporation";

  string signer = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  // members is the initial group membership list. MUST contain at least one.
  repeated Member members = 2 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  string group_metadata = 3;
  string group_policy_metadata = 4;
  // decision_policy must encode a cosmos.group.v1.ThresholdDecisionPolicy or
  // cosmos.group.v1.PercentageDecisionPolicy. Passed through to x/group.
  google.protobuf.Any decision_policy = 5 [(cosmos_proto.accepts_interface) = "cosmos.group.v1.DecisionPolicy"];
  // did is the DID of the new Corporation. MUST be globally unique.
  string did = 6;
  // language is the primary language tag (BCP 47).
  string language = 7;
  // doc_url is the URL of the v1 CGF document.
  string doc_url = 8;
  // doc_digest_sri is the digest_sri of the v1 CGF document.
  string doc_digest_sri = 9;
}

message MsgCreateCorporationResponse {
  uint64 corporation_id = 1;
  string policy_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgUpdateCorporation — MOD-CO-MSG-2. Rotates the DID of an existing
// Corporation. `language` is immutable and cannot be updated.
message MsgUpdateCorporation {
  // Only `operator` signs — `corporation` is the addressed subject resolved
  // via AUTHZ-CHECK-5 (matches MOD-EC / MOD-GF convention).
  option (cosmos.msg.v1.signer) = "operator";
  option (amino.name) = "verana/x/co/MsgUpdateCorporation";

  string corporation = 1 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string operator = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string did = 3;
}

message MsgUpdateCorporationResponse {}
