syntax = "proto3";
package verana.co.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";
import "verana/co/v1/params.proto";
import "verana/co/v1/types.proto";

option go_package = "github.com/verana-labs/verana/x/co/types";

// GenesisState defines the co module's genesis state.
message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
  repeated Corporation corporations = 2 [(gogoproto.nullable) = false, (amino.dont_omitempty) = true];
}
