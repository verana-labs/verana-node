syntax = "proto3";
package verana.co.v1;

import "amino/amino.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/timestamp.proto";
import "verana/gf/v1/types.proto";

option go_package = "github.com/verana-labs/verana-node/x/co/types";

// Corporation is the VPR-level entity that represents a legal/organizational
// authority acting in the registry. Identified by its uint64 id everywhere
// dependent entities reference it; anchored on-chain by a policy_address
// account that signs Msgs on its behalf.
message Corporation {
  uint64 id = 1;
  string policy_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string did = 3;
  google.protobuf.Timestamp created = 4 [
    (gogoproto.stdtime) = true,
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  google.protobuf.Timestamp modified = 5 [
    (gogoproto.stdtime) = true,
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  string language = 6;
  uint32 active_version = 7;
}

// CorporationWithGF is the query response shape including nested governance
// framework versions (each with its documents). Returned by MOD-CO-QRY-1
// (Get Corporation) and MOD-CO-QRY-2 (List Corporations).
message CorporationWithGF {
  uint64 id = 1;
  string policy_address = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string did = 3;
  google.protobuf.Timestamp created = 4 [
    (gogoproto.stdtime) = true,
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  google.protobuf.Timestamp modified = 5 [
    (gogoproto.stdtime) = true,
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  string language = 6;
  uint32 active_version = 7;
  repeated verana.gf.v1.GovernanceFrameworkVersionWithDocs versions = 8 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
}
