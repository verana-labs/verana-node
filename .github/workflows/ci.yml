name: Continuous Integration

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  go-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout this repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go environment
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4

      - name: Display go version
        run: go version

      - name: Run all tests
        run: make test

  build-veranad:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout this repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go environment
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4

      # Compile veranad up front so a build break fails fast and cheaply,
      # before spending time on the Docker image build and the harness run.
      - name: Build veranad binary
        run: |
          mkdir -p binaries
          GOOS=linux GOARCH=amd64 go build -o binaries/veranad-linux-amd64 ./cmd/veranad

      - name: Upload veranad binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: veranad-linux-amd64
          path: binaries/veranad-linux-amd64
          if-no-files-found: error

  test-harness:
    needs: build-veranad
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TEST_HARNESS_PATH: ./testharness
      VALIDATOR_COUNT: "2"

    steps:
      - name: Checkout this repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download veranad binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: veranad-linux-amd64
          path: binaries

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Reuse the veranad binary built in the previous job so we neither
      # recompile it here nor inside the container during the harness run.
      - name: Build canonical image locally
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/veranad.Dockerfile
          load: true
          tags: verana-node:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            USE_PREBUILT=true
            PREBUILT_BINARY=binaries/veranad-linux-amd64

      - name: Run test harness in canonical image
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            -e TEST_HARNESS_PATH \
            -e VALIDATOR_COUNT \
            verana-node:ci \
            /bin/bash -lc 'set -e
              # veranad is already baked into the image from the build-veranad job.
              # Go is still needed here because the harness journeys run via
              # "go run cmd/main.go"; the distro golang is too old, so fetch 1.26.4.
              if ! command -v go >/dev/null 2>&1; then
                GO_VERSION="1.26.4"
                curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors "https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz" -o /tmp/go.tgz
                rm -rf /usr/local/go
                tar -C /usr/local -xzf /tmp/go.tgz
                rm -f /tmp/go.tgz
              fi
              export PATH="/usr/local/go/bin:$PATH"
              echo ./scripts/setup_primary_validator.sh....
              ./scripts/setup_primary_validator.sh &
              PID=$!
              echo "Asynchronous setup process started with PID: $PID"
              for i in {1..120}; do
                if curl -s http://127.0.0.1:26657/status >/dev/null 2>&1; then
                  echo "Primary validator RPC is ready"
                  break
                fi
                sleep 2
              done
              if ! curl -s http://127.0.0.1:26657/status >/dev/null 2>&1; then
                echo "Primary validator RPC did not become ready in docker mode." >&2
                exit 1
              fi
              if [ "${VALIDATOR_COUNT:-1}" -ge 2 ]; then
                echo "Bootstrapping secondary validator in docker mode..."
                ./scripts/setup_secondary_validator.sh 2
              fi
              cd $TEST_HARNESS_PATH
              ./scripts/setup_accounts.sh
              ./scripts/run_all.sh
              kill -9 $PID || true
            '

      - name: Finalize without error
        run: echo "Test harness execution completed successfully."

  ts-client-tests:
    needs: build-veranad
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERANA_BLOCKCHAIN_PATH: ./verana
      VERANA_RPC_ENDPOINT: http://localhost:26657
      VERANA_LCD_ENDPOINT: http://localhost:1317
      VERANA_CHAIN_ID: vna-testnet-1
      VERANA_ADDRESS_PREFIX: verana
      VERANA_DENOM: uvna
      MNEMONIC: "pink glory help gown abstract eight nice crazy forward ketchup skill cheese"
      FEES: "0uvna"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ env.VERANA_BLOCKCHAIN_PATH }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: '1.26.4'
          # Repo is checked out into ./verana, so point the cache key at its go.sum.
          cache-dependency-path: ${{ env.VERANA_BLOCKCHAIN_PATH }}/go.sum

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ github.token }}

      # Reuse the veranad binary compiled by the build-veranad job instead of
      # recompiling it here (make install). It's the same binary the harness runs.
      - name: Download veranad binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: veranad-linux-amd64
          path: ${{ runner.temp }}/veranad-bin

      - name: Install veranad binary on PATH
        run: |
          BINARYPATH="$HOME/go/bin"
          mkdir -p "$BINARYPATH"
          install -m 0755 "${{ runner.temp }}/veranad-bin/veranad-linux-amd64" "$BINARYPATH/veranad"
          echo "BINARYPATH=$BINARYPATH" >> $GITHUB_ENV
          echo "$BINARYPATH" >> $GITHUB_PATH
          type veranad
          veranad version || true

      - name: Install ts-proto dependencies
        run: |
          cd ${{ env.VERANA_BLOCKCHAIN_PATH }}/ts-proto
          npm install

      - name: Generate TypeScript protobuf types
        run: |
          cd ${{ env.VERANA_BLOCKCHAIN_PATH }}
          make proto-ts

      - name: Smoke test published ts-proto package surface
        run: |
          cd ${{ env.VERANA_BLOCKCHAIN_PATH }}/ts-proto
          npm run smoke

      - name: Install test dependencies
        run: |
          cd ${{ env.VERANA_BLOCKCHAIN_PATH }}/ts-proto/test
          npm install

      - name: Type-check TypeScript test harness
        run: |
          cd ${{ env.VERANA_BLOCKCHAIN_PATH }}/ts-proto/test
          npm run build

      - name: Start blockchain node asynchronously
        run: |
          cd ${{ env.VERANA_BLOCKCHAIN_PATH }}/testharness
          echo "Starting blockchain setup using simulation script..."
          export PATH=$PATH:$BINARYPATH
          export FEES="0uvna"
          chmod +x scripts/init_chain_for_simulations.sh
          # Run the script in background - it will initialize and start the chain
          nohup ./scripts/init_chain_for_simulations.sh > /tmp/chain_setup.log 2>&1 &
          echo $! > /tmp/setup_chain_pid
          echo "Setup process started with PID: $(cat /tmp/setup_chain_pid)"

          # Wait for chain to be ready (check RPC endpoint)
          echo "Waiting for blockchain to be ready..."
          for i in {1..120}; do
            if curl -s http://localhost:26657/status > /dev/null 2>&1; then
              echo "Blockchain is ready!"
              # Show last few lines of log for debugging
              echo "--- Last 20 lines of chain setup log ---"
              tail -20 /tmp/chain_setup.log || true
              break
            fi
            if [ $i -eq 120 ]; then
              echo "Timeout waiting for blockchain to start"
              echo "--- Full chain setup log ---"
              cat /tmp/chain_setup.log || true
              exit 1
            fi
            sleep 2
          done

      - name: Run TypeScript client tests
        env:
          VERANA_RPC_ENDPOINT: ${{ env.VERANA_RPC_ENDPOINT }}
          VERANA_LCD_ENDPOINT: ${{ env.VERANA_LCD_ENDPOINT }}
          VERANA_CHAIN_ID: ${{ env.VERANA_CHAIN_ID }}
          VERANA_ADDRESS_PREFIX: ${{ env.VERANA_ADDRESS_PREFIX }}
          VERANA_DENOM: ${{ env.VERANA_DENOM }}
          MNEMONIC: ${{ env.MNEMONIC }}
          FEES: ${{ env.FEES }}
        run: |
          cd ${{ env.VERANA_BLOCKCHAIN_PATH }}
          export PATH=$PATH:$BINARYPATH

          echo "==================================================================="
          echo "Running Amino bench parity checks"
          echo "==================================================================="
          echo ""

          # Permission Amino parity (TS vs Go)
          npx --prefix ts-proto/test tsx ts-proto/test/scripts/benches/amino/perm/ts.ts
          go run ts-proto/test/scripts/benches/amino/perm/go.go
          node ts-proto/test/scripts/benches/amino/perm/compare.js

          # Credential Schema Amino parity (TS vs Go)
          npx --prefix ts-proto/test tsx ts-proto/test/scripts/benches/amino/cs/ts.ts
          go run ts-proto/test/scripts/benches/amino/cs/go.go
          node ts-proto/test/scripts/benches/amino/cs/compare.js

          # Package-owned registry/amino coverage for current main surface
          npx --prefix ts-proto/test tsx ts-proto/test/scripts/checkSigningSurface.ts

          echo "==================================================================="
          echo "Running TypeScript Client Tests"
          echo "==================================================================="
          echo ""
          echo "Environment variables:"
          echo "  VERANA_RPC_ENDPOINT: $VERANA_RPC_ENDPOINT"
          echo "  VERANA_LCD_ENDPOINT: $VERANA_LCD_ENDPOINT"
          echo "  VERANA_CHAIN_ID: $VERANA_CHAIN_ID"
          echo "  VERANA_ADDRESS_PREFIX: $VERANA_ADDRESS_PREFIX"
          echo "  VERANA_DENOM: $VERANA_DENOM"
          echo "  MNEMONIC: ${MNEMONIC:0:20}..." # Show first 20 chars only
          echo "  FEES: $FEES"
          echo ""

          # Run CO/EC/GF journey suite (hard-fail; CS/PERM/TD not yet stable)
          cd ts-proto/test
          npm run test:co-ec-gf || {
            echo "CO/EC/GF journey suite failed!"
            exit 1
          }

      - name: Kill blockchain setup process
        if: always()
        run: |
          if [ -f /tmp/setup_chain_pid ]; then
            kill -9 $(cat /tmp/setup_chain_pid) || true
            rm /tmp/setup_chain_pid
          fi
          # Also kill any veranad processes
          pkill -9 veranad || true

      - name: Finalize
        if: always()
        run: echo "TypeScript client tests execution completed."
