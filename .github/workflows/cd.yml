name: Continuous Deployment

on:
  push:
    branches: [main, 'release/**']
  workflow_dispatch:
    inputs:
      notify_tag:
        description: "Release tag to (re)announce on Discord, e.g. v1.2.0"
        required: true
        type: string

permissions:
  id-token: write   # Required for npm trusted publishing (OIDC)
  contents: write   # Required for release asset uploads via action-gh-release
  pull-requests: write  # Required by release-please

env:
  OVH_S3_APPLICATION_KEY: ${{ secrets.OVH_S3_APPLICATION_KEY }}
  OVH_S3_APPLICATION_SECRET: ${{ secrets.OVH_S3_APPLICATION_SECRET }}
  BUCKET_NAME: 'utc-public-bucket'
  BINARY_NAME: 'veranad'
  DH_USERNAME: ${{ secrets.DOCKER_HUB_LOGIN }}
  DH_TOKEN: ${{ secrets.DOCKER_HUB_PWD }}
  CANONICAL_IMAGE_NAME: ${{ secrets.DOCKER_HUB_LOGIN }}/verana-node


jobs:
  resolve-version:
    if: github.event_name == 'push'
    uses: 2060-io/organization/.github/workflows/resolve-version-call.yml@5f813454d8962db006c4e4466f3af1cf4af8dfa4 # v0.5.0
    with:
      bump-minor-pre-major: false
      create-pre-release: true
      generate-notes: true
      release-title: Release

  build-binaries-s3:
    runs-on: ubuntu-latest
    needs: [resolve-version]
    if: needs.resolve-version.outputs.new-release-published == 'true'
    outputs:
      version: ${{ steps.set-outputs.outputs.version }}
      commit: ${{ steps.set-outputs.outputs.commit }}
    steps:

      - name: Checkout gh-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
            fetch-depth: 0  # Fetch all history

      - name: Set up Go environment
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.4

      - name: Resolve effective release context
        run: |
          VERSION="${{ needs.resolve-version.outputs.release-version }}"
          RELEASE_TYPE="${{ needs.resolve-version.outputs.release-type }}"
          echo "VERSION=${VERSION}"
          echo "RELEASE_TYPE=${RELEASE_TYPE}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "RELEASE_TYPE=${RELEASE_TYPE}" >> $GITHUB_ENV

      - name: Set LDFLAGS environment variable
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          LDFLAGS="-X github.com/cosmos/cosmos-sdk/version.Name=verana \
          -X github.com/cosmos/cosmos-sdk/version.AppName=verana \
          -X github.com/cosmos/cosmos-sdk/version.Version=${VERSION} \
          -X github.com/cosmos/cosmos-sdk/version.Commit=${COMMIT}"
          echo "LDFLAGS=${LDFLAGS}"
          echo "VERSION=${VERSION}"
          echo "COMMIT=${COMMIT}"
          echo "LDFLAGS=${LDFLAGS}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "COMMIT=${COMMIT}" >> $GITHUB_ENV

      - name: Set build outputs
        id: set-outputs
        run: |
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT

      - name: Build binary for Linux AMD64
        run: |
          mkdir -p binaries/testnet_v1
          echo "LDFLAGS: $LDFLAGS"
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o binaries/${{env.BINARY_NAME}}-linux-amd64 ./cmd/${{env.BINARY_NAME}}

      - name: Build binary for Linux ARM64
        run: |
          mkdir -p binaries/testnet_v1
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o binaries/${{env.BINARY_NAME}}-linux-arm64 ./cmd/${{env.BINARY_NAME}}

      - name: Build binary for Darwin AMD64
        run: |
          mkdir -p binaries/testnet_v1
          GOOS=darwin GOARCH=amd64 go build -ldflags="$LDFLAGS" -o binaries/${{env.BINARY_NAME}}-darwin-amd64 ./cmd/${{env.BINARY_NAME}}

      - name: Build binary for Darwin ARM64
        run: |
          mkdir -p binaries/testnet_v1
          GOOS=darwin GOARCH=arm64 go build -ldflags="$LDFLAGS" -o binaries/${{env.BINARY_NAME}}-darwin-arm64 ./cmd/${{env.BINARY_NAME}}

      - name: Generate MD5 Checksums
        run: |
          mkdir -p binaries/checksums
          md5sum binaries/${{env.BINARY_NAME}}-linux-amd64 > binaries/checksums/md5sums.txt
          md5sum binaries/${{env.BINARY_NAME}}-linux-arm64 >> binaries/checksums/md5sums.txt
          md5sum binaries/${{env.BINARY_NAME}}-darwin-amd64 >> binaries/checksums/md5sums.txt
          md5sum binaries/${{env.BINARY_NAME}}-darwin-arm64 >> binaries/checksums/md5sums.txt
          cat binaries/checksums/md5sums.txt

      - name: Generate COMMIT info
        run: |
          mkdir -p binaries/checksums
          echo VERSION=$VERSION >> binaries/checksums/commit.sha1
          echo COMMIT=$(git rev-parse --long HEAD) >> binaries/checksums/commit.sha1
          cat binaries/checksums/commit.sha1

      - name: Upload linux-amd64 binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: veranad-linux-amd64
          path: binaries/${{env.BINARY_NAME}}-linux-amd64
          if-no-files-found: error

      - name: Install s3cmd
        run: sudo apt-get install s3cmd

      - name: Configure s3cmd
        run: s3cmd --access_key=$OVH_S3_APPLICATION_KEY --secret_key=$OVH_S3_APPLICATION_SECRET --region=bhs --host=s3.bhs.io.cloud.ovh.net --host-bucket=HOST_BUCKET --ssl --no-encrypt --dump-config 2>&1 | tee /home/runner/.s3cfg

      - name: Upload binaries to OVH
        run: |
          s3cmd put binaries/${{env.BINARY_NAME}}-linux-amd64 s3://$BUCKET_NAME/binaries/${{ env.VERSION }}/${{env.BINARY_NAME}}-${{ env.COMMIT }}-linux-amd64 --acl-public
          s3cmd put binaries/${{env.BINARY_NAME}}-linux-arm64 s3://$BUCKET_NAME/binaries/${{ env.VERSION }}/${{env.BINARY_NAME}}-${{ env.COMMIT }}-linux-arm64 --acl-public
          s3cmd put binaries/${{env.BINARY_NAME}}-darwin-amd64 s3://$BUCKET_NAME/binaries/${{ env.VERSION }}/${{env.BINARY_NAME}}-${{ env.COMMIT }}-darwin-amd64 --acl-public
          s3cmd put binaries/${{env.BINARY_NAME}}-darwin-arm64 s3://$BUCKET_NAME/binaries/${{ env.VERSION }}/${{env.BINARY_NAME}}-${{ env.COMMIT }}-darwin-arm64 --acl-public
          s3cmd put binaries/checksums/commit.sha1 s3://$BUCKET_NAME/binaries/${{ env.VERSION }}/${{ env.COMMIT }}.sha1 --acl-public
          s3cmd put binaries/checksums/md5sums.txt s3://$BUCKET_NAME/binaries/${{ env.VERSION }}/md5sums.txt --acl-public

      - name: Update manifest.json
        run: |
          # Create or update manifest.json
          cat > manifest.json <<EOL
          {
            "linux-amd64": "${{env.BINARY_NAME}}-${{ env.VERSION }}-${{ env.COMMIT }}-linux-amd64",
            "linux-arm64": "${{env.BINARY_NAME}}-${{ env.VERSION }}-${{ env.COMMIT }}-linux-arm64",
            "darwin-amd64": "${{env.BINARY_NAME}}-${{ env.VERSION }}-${{ env.COMMIT }}-darwin-amd64",
            "darwin-arm64": "${{env.BINARY_NAME}}-${{ env.VERSION }}-${{ env.COMMIT }}-darwin-arm64"
          }
          EOL

          # Upload manifest.json to S3
          s3cmd put manifest.json s3://$BUCKET_NAME/binaries/manifest.json --acl-public --force

      - name: Verify release assets exist
        run: |
          set -euo pipefail
          for path in \
            "binaries/${{env.BINARY_NAME}}-linux-amd64" \
            "binaries/${{env.BINARY_NAME}}-linux-arm64" \
            "binaries/${{env.BINARY_NAME}}-darwin-amd64" \
            "binaries/${{env.BINARY_NAME}}-darwin-arm64" \
            "binaries/checksums/md5sums.txt"
          do
            if [ ! -f "$path" ]; then
              echo "Missing release asset: $path" >&2
              exit 1
            fi
          done

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.VERSION }} # Explicitly specify the tag
          name: Release ${{ env.VERSION }} # Name the release
          files: |
            binaries/${{env.BINARY_NAME}}-linux-amd64
            binaries/${{env.BINARY_NAME}}-linux-arm64
            binaries/${{env.BINARY_NAME}}-darwin-amd64
            binaries/${{env.BINARY_NAME}}-darwin-arm64
            binaries/checksums/md5sums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GitHub release assets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const expected = [
              `${process.env.BINARY_NAME}-linux-amd64`,
              `${process.env.BINARY_NAME}-linux-arm64`,
              `${process.env.BINARY_NAME}-darwin-amd64`,
              `${process.env.BINARY_NAME}-darwin-arm64`,
              'md5sums.txt',
            ];
            const { owner, repo } = context.repo;
            const tag = process.env.VERSION;
            const delay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            let assetNames = [];
            for (let attempt = 1; attempt <= 6; attempt += 1) {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });
              assetNames = release.data.assets.map((asset) => asset.name);
              const missing = expected.filter((name) => !assetNames.includes(name));

              if (missing.length === 0) {
                return;
              }

              if (attempt < 6) {
                core.info(
                  `Release assets still propagating for ${tag}. Missing: ${missing.join(', ')}. Retrying...`
                );
                await delay(5000);
              } else {
                core.setFailed(
                  `Missing release assets for ${tag}: ${missing.join(', ')}. Found: ${assetNames.join(', ')}`
                );
              }
            }

  publish-ts-proto:
    runs-on: ubuntu-latest
    needs: [resolve-version]
    if: needs.resolve-version.outputs.new-release-published == 'true'
    steps:
      - name: Checkout gh-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Corepack pnpm
        # OIDC publishing requires a very up to date npm version
        run: |
          npm install -g npm@latest
          corepack enable

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          github_token: ${{ github.token }}

      - name: Resolve effective release context
        run: |
          VERSION="${{ needs.resolve-version.outputs.release-version }}"
          RELEASE_TYPE="${{ needs.resolve-version.outputs.release-type }}"
          NPM_VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}"
          echo "RELEASE_TYPE=${RELEASE_TYPE}"
          echo "NPM_VERSION=${NPM_VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "RELEASE_TYPE=${RELEASE_TYPE}" >> $GITHUB_ENV
          echo "NPM_VERSION=${NPM_VERSION}" >> $GITHUB_ENV

      - name: Generate ts-proto package and pack
        run: |
          cd "$GITHUB_WORKSPACE/proto"
          buf generate --template buf.gen.ts.yaml
          cd "$GITHUB_WORKSPACE/ts-proto"
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          rm -f verana-labs-verana-types-*.tgz
          npm pkg set version="${NPM_VERSION}"
          npm pack
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Package version now: ${PKG_VERSION}"
          PKG_TGZ=$(ls -t verana-labs-verana-types-*.tgz | head -n 1)
          echo "PKG_TGZ=${PKG_TGZ}" >> $GITHUB_ENV

      - name: Publish ts-proto package
        working-directory: ts-proto
        continue-on-error: true
        run: |
          if [ "$RELEASE_TYPE" = "stable" ]; then
            npm publish --provenance
          else
            npm publish --provenance --tag dev
          fi

      - name: Verify packed asset exists
        run: |
          set -euo pipefail
          if [ ! -f "ts-proto/${PKG_TGZ}" ]; then
            echo "Missing packed asset: ts-proto/${PKG_TGZ}" >&2
            exit 1
          fi

      - name: Upload ts-proto package to GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          files: |
            ts-proto/${{ env.PKG_TGZ }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-canonical-image:
    runs-on: ubuntu-latest
    needs: build-binaries-s3
    if: needs.build-binaries-s3.result == 'success'
    permissions:
      contents: read
    steps:
      - name: Checkout this repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Download linux-amd64 binary artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: veranad-linux-amd64
          path: binaries

      - name: Login to Docker Hub
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          username: ${{ env.DH_USERNAME }}
          password: ${{ env.DH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push canonical image (tagged binary)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: docker/veranad.Dockerfile
          push: true
          tags: |
            ${{ env.CANONICAL_IMAGE_NAME }}:${{ needs.build-binaries-s3.outputs.version }}
          build-args: |
            USE_PREBUILT=true
            PREBUILT_BINARY=binaries/veranad-linux-amd64

  discord-notify:
    needs: [resolve-version, build-binaries-s3, publish-ts-proto, build-canonical-image]
    if: needs.resolve-version.outputs.new-release-published == 'true' && needs.resolve-version.outputs.release-type == 'stable'
    permissions:
      contents: read
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@5f813454d8962db006c4e4466f3af1cf4af8dfa4 # v0.5.0
    with:
      tag_name: ${{ needs.resolve-version.outputs.release-version }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}

  discord-notify-manual:
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    uses: 2060-io/organization/.github/workflows/discord-release-notify-call.yml@5f813454d8962db006c4e4466f3af1cf4af8dfa4 # v0.5.0
    with:
      tag_name: ${{ inputs.notify_tag }}
    secrets:
      DISCORD_UPDATES_WEBHOOK_URL: ${{ secrets.DISCORD_UPDATES_WEBHOOK_URL }}
